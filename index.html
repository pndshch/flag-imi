<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  background:
    radial-gradient(1.5px 1.5px at 18% 12%, rgba(255,255,255,0.30), transparent 50%),
    radial-gradient(1px 1px at 72% 8%, rgba(255,255,255,0.22), transparent 50%),
    radial-gradient(1px 1px at 88% 30%, rgba(255,255,255,0.20), transparent 50%),

  color: #e6ebf4;
  font-family: system-ui, -apple-system, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Yu Gothic', Meiryo, sans-serif;
  min-height: 100vh;
  padding: 18px 14px 48px;
  line-height: 1.6;
}
.container { max-width: 900px; margin: 0 auto; }

/* language switch */
.lang-switch { position: fixed; top: 12px; right: 12px; display: flex; gap: 2px; background: rgba(16,22,36,0.92); border: 1px solid rgba(91,159,240,0.35); border-radius: 8px; padding: 3px; z-index: 1000; }
.lang-btn { background: transparent; border: none; color: #7fb4f0; font-size: 11px; font-weight: 700; padding: 5px 9px; border-radius: 5px; cursor: pointer; letter-spacing: 0.5px; }
.lang-btn.active { background: #5b9ff0; color: #0a0e18; }

/* header */
.topbar { display: flex; justify-content: space-between; align-items: center; color: #7fb4f0; font-size: 12px; margin-bottom: 14px; }
.topbar a { color: #7fb4f0; text-decoration: none; }
.topbar a:hover { color: #aacdf6; }
.brand { text-align: center; margin-bottom: 16px; }
.brand-title { font-size: 30px; font-weight: 800; letter-spacing: 1px; color: #f3f6fb; }
.brand-sub { color: #8a96ab; font-size: 12px; margin-top: 5px; letter-spacing: 0.5px; }

/* search */
.search-wrap { margin-bottom: 12px; }
#search { width: 100%; padding: 12px 14px; background: rgba(8,12,20,0.7); border: 1px solid rgba(91,159,240,0.35); color: #fff; border-radius: 10px; font-size: 15px; font-family: inherit; outline: none; }
#search:focus { border-color: #5b9ff0; }
#search::placeholder { color: #6c7689; }

/* region chips */
.chips { display: flex; gap: 6px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.chips::-webkit-scrollbar { display: none; }
.chip-btn { flex: 0 0 auto; padding: 8px 13px; background: rgba(8,12,20,0.6); border: 1px solid rgba(255,255,255,0.10); color: #aab4c6; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; white-space: nowrap; transition: background 0.15s, color 0.15s, border-color 0.15s; }
.chip-btn:hover { border-color: rgba(91,159,240,0.5); color: #e6ebf4; }
.chip-btn.active { background: #5b9ff0; border-color: #5b9ff0; color: #0a0e18; }
.chip-btn .cb-n { font-size: 11px; opacity: 0.7; margin-left: 3px; }
.chip-btn.active .cb-n { opacity: 0.85; }

.count-line { color: #6f7a8d; font-size: 12px; margin: 2px 2px 12px; }

/* grid */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(146px, 1fr)); gap: 12px; }
.item { background: #161d2e; border: 1px solid rgba(255,255,255,0.07); border-radius: 11px; padding: 10px 10px 12px; cursor: pointer; transition: transform 0.14s, border-color 0.14s, box-shadow 0.14s; }
.item:hover { transform: translateY(-3px); border-color: #5b9ff0; box-shadow: 0 7px 22px rgba(0,0,0,0.45); }
.flag-box { aspect-ratio: 3 / 2; border: 1px solid rgba(255,255,255,0.20); border-radius: 4px; background: #0c111c; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.flag-box img { width: 100%; height: 100%; object-fit: contain; display: block; }
.item .nm { font-size: 13px; font-weight: 700; color: #f1f4f9; text-align: center; margin-top: 9px; line-height: 1.35; }
.item .rg { font-size: 10px; color: #6f7a8d; text-align: center; margin-top: 2px; }
.empty-msg { grid-column: 1 / -1; padding: 48px 20px; text-align: center; color: #6f7a8d; font-size: 14px; }

/* footer */
.footer { margin-top: 28px; text-align: center; color: #5d6678; font-size: 11px; }
.footer a { color: #5d6678; text-decoration: none; }
.footer a:hover { color: #8a96ab; }
.footer .disc { margin-top: 7px; font-size: 10px; opacity: 0.8; line-height: 1.6; max-width: 560px; margin-left: auto; margin-right: auto; }

/* modal */
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.82); z-index: 200; display: none; align-items: flex-end; justify-content: center; backdrop-filter: blur(7px); }
.modal.show { display: flex; animation: fadein 0.18s; }
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
.modal-inner { background: linear-gradient(165deg, #1a2336, #10151f); border: 1px solid rgba(91,159,240,0.35); border-radius: 20px 20px 0 0; width: 100%; max-width: 560px; max-height: 92vh; overflow-y: auto; padding: 16px 18px 34px; animation: slideup 0.28s cubic-bezier(.2,.7,.3,1); }
@keyframes slideup { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-close { position: sticky; top: 0; margin-left: auto; margin-bottom: -34px; width: 36px; height: 36px; background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 50%; cursor: pointer; font-size: 17px; display: flex; align-items: center; justify-content: center; z-index: 10; }

.detail-flag { margin: 6px auto 14px; max-width: 300px; }
.detail-flag .flag-box { aspect-ratio: auto; border-width: 1px; border-radius: 6px; }
.detail-flag img { width: 100%; height: auto; max-height: 200px; object-fit: contain; display: block; }
.detail-name { text-align: center; font-size: 23px; font-weight: 800; color: #fff; }
.detail-sub { text-align: center; font-size: 13px; color: #8a96ab; margin-top: 2px; }
.chips-row { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin: 12px 0 16px; }
.chip { background: rgba(91,159,240,0.14); border: 1px solid rgba(91,159,240,0.45); color: #aacdf6; padding: 4px 11px; border-radius: 13px; font-size: 11px; font-weight: 700; }
.chip-disp { background: rgba(240,108,108,0.15); border-color: rgba(240,108,108,0.55); color: #f3a3a3; }

.section { margin-bottom: 12px; padding: 13px 14px; background: rgba(0,0,0,0.30); border-radius: 11px; border-left: 3px solid var(--accent, #5b9ff0); }
.section-title { font-size: 11px; color: var(--accent, #5b9ff0); letter-spacing: 1.5px; margin-bottom: 9px; font-weight: 800; text-transform: uppercase; }

.crow { display: flex; gap: 11px; padding: 8px 0; border-bottom: 1px dashed rgba(255,255,255,0.08); }
.crow:first-of-type { padding-top: 0; }
.crow:last-child { border-bottom: none; padding-bottom: 0; }
.swatch { flex: 0 0 auto; width: 26px; height: 26px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.25); margin-top: 1px; }
.crow-b { flex: 1; }
.row-h { font-size: 14px; font-weight: 700; color: #f1f4f9; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.row-m { font-size: 13px; color: #c4ccda; margin-top: 3px; line-height: 1.65; }
.erow { padding: 8px 0; border-bottom: 1px dashed rgba(255,255,255,0.08); }
.erow:first-of-type { padding-top: 0; }
.erow:last-child { border-bottom: none; padding-bottom: 0; }

.tag { font-size: 9px; font-weight: 800; letter-spacing: 0.5px; padding: 2px 6px; border-radius: 9px; white-space: nowrap; }
.tag-off { background: rgba(74,200,140,0.16); border: 1px solid rgba(74,200,140,0.5); color: #7fd9ab; }
.tag-pop { background: rgba(232,176,90,0.14); border: 1px solid rgba(232,176,90,0.45); color: #e3bd7e; }

.advice { background: linear-gradient(135deg, rgba(91,159,240,0.14), rgba(91,159,240,0.05)); border: 1px solid rgba(91,159,240,0.3); padding: 13px 14px; border-radius: 11px; }
.advice-label { font-size: 11px; color: #7fb4f0; letter-spacing: 1.5px; margin-bottom: 5px; font-weight: 800; text-transform: uppercase; }
.advice-text { font-size: 14px; line-height: 1.75; color: #e6ebf4; }

@media (max-width: 480px) {
  body { padding: 16px 11px 44px; }
  .brand-title { font-size: 25px; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(132px, 1fr)); gap: 10px; }
  .detail-name { font-size: 21px; }
}
</style>
</head>

<script>

  ({ code, name, region, ratio, year, colors, emblems, summary, disp });

const REGION_ORDER = ['asia', 'europe', 'africa', 'namerica', 'samerica', 'oceania'];
const REGION_LABEL = {

  },
  en: {
    title: 'Meaning of World Flags',
    back: '← Pinda Lab',
    tagline: '197 countries and territories — the meaning behind every colour and symbol',
    searchPh: '🔍 Search by country name',
    all: 'All',
    colors: 'Colours',

    unit: ' flags',

const FLAGS = [
F("af", t("アフガニスタン","Afghanistan"), "asia", "1:2", t("2021年（事実上）","2021 (de facto)"),
  [
    C("#000000", t("黒","Black"), t("過去の植民地支配・苦難の時代を表すとされる","Taken to represent the past era of colonial occupation and hardship"), false),
    C("#d32011", t("赤","Red"), t("独立のために流された血を表すとされる","Taken to represent the blood shed for independence"), false),
    C("#007a36", t("緑","Green"), t("イスラームと希望、繁栄を表すとされる","Taken to represent Islam, hope and prosperity"), false)
  ],
  [
    E(t("国章とシャハーダ","National emblem with the Shahada"), t("白い国章はミフラーブと説教壇を備えたモスク、左右の旗、麦の穂を描き、上部にイスラームの信仰告白（シャハーダ）が記される","The white emblem shows a mosque with mihrab and pulpit flanked by flags and wheat sheaves, with the Islamic declaration of faith above"))
  ],
  t("黒・赤・緑の縦三分割に白い国章を置く意匠。これは1996〜2001年のターリバーン政権下で用いられた白旗ではなく、2021年の政変後に事実上の国旗として掲げられているもので、旧アフガニスタン・イスラーム共和国の三色旗を引き継ぐ配色である。国際的な承認状況は限定的である。","A vertical tricolour of black, red and green charged with a white state emblem. Flown as the de facto national flag since the 2021 change of government, it retains the tricolour scheme of the former Islamic Republic rather than the Taliban's earlier white banner. Its international recognition remains limited."), true),
F("am", t("アルメニア","Armenia"), "asia", "1:2", t("1990年","1990"),
  [
    C("#D90012", t("赤","Red"), t("アルメニア高原、キリスト教信仰の維持のために流された血、生存への闘い","The Armenian highland, the blood shed to preserve the Christian faith, and the struggle for survival")),
    C("#0033A0", t("青","Blue"), t("アルメニアの空のもとで平和に生きる国民の意志","The will of the Armenian people to live under peaceful skies")),
    C("#F2A800", t("オレンジ","Orange"), t("国民の創造的才能と勤勉さ","The creative talent and industrious nature of the people"))

  t("赤・青・オレンジ（杏色）の横三分割旗。1918年の第一共和国の旗を1990年に復活させたもので、各色の意味は2006年の国旗法に明記されている。","A horizontal tricolour of red, blue and orange (apricot). Readopted in 1990 from the flag of the First Republic of 1918, with the meaning of each colour set out in the 2006 flag law.")),
F("az", t("アゼルバイジャン","Azerbaijan"), "asia", "1:2", t("1991年","1991"),
  [
    C("#00b9e4", t("空色","Sky blue"), t("テュルク系諸民族との結びつきを表す","Represents the nation's Turkic heritage")),
    C("#ed2939", t("赤","Red"), t("近代化と民主主義の発展を表す","Represents progress towards modernisation and democracy")),
    C("#3f9c35", t("緑","Green"), t("イスラームとの結びつきを表す","Represents the nation's connection to Islam"))
  ],
  [
    E(t("三日月と八条星","Crescent and eight-pointed star"), t("白い三日月はイスラームを、八条の星はテュルク系の8つの民族集団を表すと一般に説明される","The white crescent denotes Islam, and the eight-pointed star is commonly explained as the eight Turkic peoples"))
  ],
  t("空色・赤・緑の横三分割に白い三日月と八条星を配す。1918〜1920年のアゼルバイジャン民主共和国の旗を1991年の独立時に復活させた。","A horizontal tricolour of sky blue, red and green with a white crescent and eight-pointed star. Readopted on independence in 1991 from the flag of the Democratic Republic of 1918-1920.")),
F("bh", t("バーレーン","Bahrain"), "asia", "3:5", t("2002年","2002"),
  [
    C("#ce1126", t("赤","Red"), t("バーレーンの伝統色。歴史的にハワーリジュ派以外のアラブ首長国が用いた色","The traditional colour of Bahrain, historically used by Arab states that were not Kharijite")),

  [

    C("#f42a41", t("赤","Red"), t("独立戦争で犠牲となった人々の血、また昇る太陽","The blood of those who died for independence, and the rising sun"))
  ],
  [
    E(t("赤い円板","Red disc"), t("緑地に置かれた赤い円。独立のために流された血と、新国家に昇る太陽を表す。中心からやや旗竿側に寄せて配置される","A red disc on the green field, representing the blood of independence and the sun rising over the new nation; set slightly towards the hoist"))
  ],
  t("緑地の中央やや旗竿寄りに赤い円板を置く意匠。1971年の独立戦争中に考案され、緑はベンガルの大地、赤い円は犠牲者の血と昇る太陽を表す。","A green field bearing a red disc set slightly towards the hoist. Devised during the 1971 war of independence: the green is the land of Bengal and the red disc the blood of the fallen and the rising sun.")),
F("bt", t("ブータン","Bhutan"), "asia", "2:3", t("1969年","1969"),
  [
    C("#f7e017", t("黄","Yellow"), t("国王の世俗的権威と統治を表す","The secular authority and civil tradition of the King")),

  ],
  [

F("bn", t("ブルネイ","Brunei"), "asia", "1:2", t("1959年","1959"),
  [
    C("#f7e017", t("黄","Yellow"), t("スルタンの色。マレー世界で君主を表す王室色","The colour of the Sultan, the royal colour of monarchy in the Malay world")),
    C("#ffffff", t("白","White"), t("斜帯の一つ。歴史的に2人の重臣（ワジール）を表すとされる","One of the diagonal stripes, said to represent two of the chief ministers")),
    C("#000000", t("黒","Black"), t("斜帯の一つ。歴史的に重臣（ワジール）を表すとされる","One of the diagonal stripes, said to represent the chief ministers")),

F("kh", t("カンボジア","Cambodia"), "asia", "2:3", t("1993年","1993"),

let curRegion = 'all', curFlag = null;
const chipsEl = document.getElementById('chips');
const gridEl = document.getElementById('grid');
const countEl = document.getElementById('count');
const searchEl = document.getElementById('search');
const modalEl = document.getElementById('modal');
const modalInner = document.getElementById('modal-inner');
const detailEl = document.getElementById('detail');

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function renderChips() {
  const u = I18N_UI[curLang];
  const counts = { all: FLAGS.length };
  REGION_ORDER.forEach(r => counts[r] = FLAGS.filter(f => f.region === r).length);
  let h = '<button class="chip-btn' + (curRegion === 'all' ? ' active' : '') + '" data-region="all">' +
    escapeHTML(u.all) + ' <span class="cb-n">' + counts.all + '</span></button>';
  REGION_ORDER.forEach(r => {
    h += '<button class="chip-btn' + (curRegion === r ? ' active' : '') + '" data-region="' + r + '">' +
      escapeHTML(L(REGION_LABEL[r])) + ' <span class="cb-n">' + counts[r] + '</span></button>';
  });
  chipsEl.innerHTML = h;
  chipsEl.querySelectorAll('.chip-btn').forEach(b => b.addEventListener('click', () => {
    curRegion = b.dataset.region;
    renderChips();
    renderGrid();
  }));
}

function renderGrid() {
  const u = I18N_UI[curLang];
  const q = (searchEl.value || '').trim().toLowerCase();
  let list = FLAGS.filter(f => {
    if (curRegion !== 'all' && f.region !== curRegion) return false;
    if (q) return f.name.j.toLowerCase().includes(q) || f.name.e.toLowerCase().includes(q) || f.code.includes(q);
    return true;
  });
  list.sort((a, b) => L(a.name).localeCompare(L(b.name), curLang === 'ja' ? 'ja' : 'en'));
  countEl.textContent = list.length + (curLang === 'ja' ? '件' : u.unit);
  if (!list.length) {
    gridEl.innerHTML = '<div class="empty-msg">' + escapeHTML(u.empty) + '</div>';
    return;
  }
  gridEl.innerHTML = list.map(f =>
    '<div class="item" data-code="' + f.code + '">' +
    '<div class="flag-box"><img loading="lazy" src="flags/' + f.code + '.svg" alt="' + escapeHTML(L(f.name)) + '"></div>' +
    '<div class="nm">' + escapeHTML(L(f.name)) + '</div>' +
    '<div class="rg">' + escapeHTML(L(REGION_LABEL[f.region])) + '</div>' +
    '</div>'
  ).join('');
  gridEl.querySelectorAll('.item').forEach(el => el.addEventListener('click', () => {
    const f = FLAGS.find(x => x.code === el.dataset.code);
    if (f) openModal(f);
  }));
}

function rowTag(off) {
  const u = I18N_UI[curLang];
  return off
    ? '<span class="tag tag-off">' + escapeHTML(u.official) + '</span>'
    : '<span class="tag tag-pop">' + escapeHTML(u.popular) + '</span>';
}

function buildDetail(f) {
  const u = I18N_UI[curLang];
  const subName = curLang === 'ja' ? f.name.e : f.name.j;
  let h = '<div class="detail-flag"><div class="flag-box"><img src="flags/' + f.code + '.svg" alt=""></div></div>';
  h += '<div class="detail-name">' + escapeHTML(L(f.name)) + '</div>';
  h += '<div class="detail-sub">' + escapeHTML(subName) + '</div>';
  h += '<div class="chips-row">';
  h += '<span class="chip">' + escapeHTML(L(REGION_LABEL[f.region])) + '</span>';
  h += '<span class="chip">' + escapeHTML(u.ratio) + ' ' + escapeHTML(f.ratio) + '</span>';
  h += '<span class="chip">' + escapeHTML(u.adopted) + ' ' + escapeHTML(L(f.year)) + '</span>';
  if (f.disp) h += '<span class="chip chip-disp">' + escapeHTML(u.disputed) + '</span>';
  h += '</div>';
  h += '<div class="section"><div class="section-title">' + escapeHTML(u.colors) + '</div>';
  f.colors.forEach(c => {
    h += '<div class="crow"><span class="swatch" style="background:' + escapeHTML(c.hex) + '"></span>' +
      '<div class="crow-b"><div class="row-h">' + escapeHTML(L(c.label)) + ' ' + rowTag(c.off) + '</div>' +
      '<div class="row-m">' + escapeHTML(L(c.mean)) + '</div></div></div>';
  });
  h += '</div>';
  if (f.emblems && f.emblems.length) {
    h += '<div class="section"><div class="section-title" style="color:#e3bd7e">' + escapeHTML(u.symbols) + '</div>';
    f.emblems.forEach(e => {
      h += '<div class="erow"><div class="row-h">' + escapeHTML(L(e.name)) + ' ' + rowTag(e.off) + '</div>' +
        '<div class="row-m">' + escapeHTML(L(e.mean)) + '</div></div>';
    });
    h += '</div>';
  }
  h += '<div class="advice"><div class="advice-label">' + escapeHTML(u.about) + '</div>' +
    '<div class="advice-text">' + escapeHTML(L(f.summary)) + '</div></div>';
  return h;
}

function openModal(f) {
  curFlag = f;
  detailEl.innerHTML = buildDetail(f);
  modalEl.classList.add('show');
  modalInner.scrollTop = 0;
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  modalEl.classList.remove('show');
  curFlag = null;
  document.body.style.overflow = '';
}

function applyLang(lang) {
  curLang = (lang === 'en') ? 'en' : 'ja';
  const u = I18N_UI[curLang];
  document.documentElement.lang = curLang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if (u[k] != null) el.textContent = u[k];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const k = el.dataset.i18nPlaceholder;
    if (u[k] != null) el.placeholder = u[k];
  });
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === curLang));
  document.title = u.title + ' | Pinda Lab';
  try { localStorage.setItem('pl-lang', curLang); } catch (e) {}
  renderChips();
  renderGrid();
  if (modalEl.classList.contains('show') && curFlag) detailEl.innerHTML = buildDetail(curFlag);
}

searchEl.addEventListener('input', renderGrid);
document.getElementById('close').addEventListener('click', closeModal);
modalEl.addEventListener('click', e => { if (e.target === modalEl) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape' && modalEl.classList.contains('show')) closeModal(); });
document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => applyLang(b.dataset.lang)));

let initLang;
try { initLang = localStorage.getItem('pl-lang'); } catch (e) {}
if (!initLang) initLang = (navigator.language || 'ja').toLowerCase().startsWith('ja') ? 'ja' : 'en';
applyLang(initLang);
</script>
