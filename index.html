* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

.container { max-width: 900px; margin: 0 auto; }

/* language switch */
.lang-switch { position: fixed; top: 12px; right: 12px; background: rgba(16,22,36,0.92); border: 1px solid rgba(91,159,240,0.35); border-radius: 8px; padding: 3px 4px; z-index: 1000; }
#lang-select { background: transparent; border: none; color: #7fb4f0; font-size: 12px; font-weight: 700; padding: 4px 6px; border-radius: 5px; cursor: pointer; font-family: inherit; outline: none; max-width: 165px; }
#lang-select option { background: #10151f; color: #e6ebf4; font-weight: 600; }
[dir="rtl"] .lang-switch { right: auto; left: 12px; }
[dir="rtl"] .section { border-left: none; border-right: 3px solid var(--accent, #5b9ff0); }
[dir="rtl"] .modal-close { margin-left: 0; margin-right: auto; }

/* header */
.topbar { display: flex; justify-content: space-between; align-items: center; color: #7fb4f0; font-size: 12px; margin-bottom: 14px; }
.topbar a { color: #7fb4f0; text-decoration: none; }
.topbar a:hover { color: #aacdf6; }
.brand { text-align: center; margin-bottom: 16px; }
.brand-title { font-size: 30px; font-weight: 800; letter-spacing: 1px; color: #f3f6fb; }
.brand-sub { color: #8a96ab; font-size: 12px; margin-top: 5px; letter-spacing: 0.5px; }

#search { width: 100%; padding: 12px 14px; background: rgba(8,12,20,0.7); border: 1px solid rgba(91,159,240,0.35); color: #fff; border-radius: 10px; font-size: 15px; font-family: inherit; outline: none; }
#search:focus { border-color: #5b9ff0; }
#search::placeholder { color: #6c7689; }

.chips { display: flex; gap: 6px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.chips::-webkit-scrollbar { display: none; }
.chip-btn { flex: 0 0 auto; padding: 8px 13px; background: rgba(8,12,20,0.6); border: 1px solid rgba(255,255,255,0.10); color: #aab4c6; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; white-space: nowrap; transition: background 0.15s, color 0.15s, border-color 0.15s; }
.chip-btn:hover { border-color: rgba(91,159,240,0.5); color: #e6ebf4; }
.chip-btn.active { background: #5b9ff0; border-color: #5b9ff0; color: #0a0e18; }
.chip-btn .cb-n { font-size: 11px; opacity: 0.7; margin-left: 3px; }
.chip-btn.active .cb-n { opacity: 0.85; }

.count-line { color: #6f7a8d; font-size: 12px; margin: 2px 2px 12px; }

/* grid */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(146px, 1fr)); gap: 12px; }
.item { background: #161d2e; border: 1px solid rgba(255,255,255,0.07); border-radius: 11px; padding: 10px 10px 12px; cursor: pointer; transition: transform 0.14s, border-color 0.14s, box-shadow 0.14s; }
.item:hover { transform: translateY(-3px); border-color: #5b9ff0; box-shadow: 0 7px 22px rgba(0,0,0,0.45); }

.flag-box img { width: 100%; height: 100%; object-fit: contain; display: block; }
.item .nm { font-size: 13px; font-weight: 700; color: #f1f4f9; text-align: center; margin-top: 9px; line-height: 1.35; }
.item .rg { font-size: 10px; color: #6f7a8d; text-align: center; margin-top: 2px; }
.empty-msg { grid-column: 1 / -1; padding: 48px 20px; text-align: center; color: #6f7a8d; font-size: 14px; }

.footer { margin-top: 28px; text-align: center; color: #5d6678; font-size: 11px; }
.footer a { color: #5d6678; text-decoration: none; }
.footer a:hover { color: #8a96ab; }
.footer .disc { margin-top: 7px; font-size: 10px; opacity: 0.8; line-height: 1.6; max-width: 560px; margin-left: auto; margin-right: auto; }

@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

let curRegion = 'all', curFlag = null;
const chipsEl = document.getElementById('chips');
const gridEl = document.getElementById('grid');
const countEl = document.getElementById('count');
const searchEl = document.getElementById('search');
const modalEl = document.getElementById('modal');
const modalInner = document.getElementById('modal-inner');
const detailEl = document.getElementById('detail');

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function renderChips() {
  const u = UITR[curLang] || UITR.en;
  const counts = { all: FLAGS.length };
  REGION_ORDER.forEach(r => counts[r] = FLAGS.filter(f => f.region === r).length);
  let h = '<button class="chip-btn' + (curRegion === 'all' ? ' active' : '') + '" data-region="all">' +
    escapeHTML(u.all) + ' <span class="cb-n">' + counts.all + '</span></button>';
  REGION_ORDER.forEach(r => {
    h += '<button class="chip-btn' + (curRegion === r ? ' active' : '') + '" data-region="' + r + '">' +
      escapeHTML(u[r]) + ' <span class="cb-n">' + counts[r] + '</span></button>';
  });
  chipsEl.innerHTML = h;
  chipsEl.querySelectorAll('.chip-btn').forEach(b => b.addEventListener('click', () => {
    curRegion = b.dataset.region;
    renderChips();
    renderGrid();
  }));
}

function renderGrid() {
  const u = UITR[curLang] || UITR.en;
  const q = (searchEl.value || '').trim().toLowerCase();
  let list = FLAGS.filter(f => {
    if (curRegion !== 'all' && f.region !== curRegion) return false;
    if (q) return (TR[curLang][f.name] || '').toLowerCase().includes(q) || (TR.ja[f.name] || '').toLowerCase().includes(q) || (TR.en[f.name] || '').toLowerCase().includes(q) || f.code.includes(q);
    return true;
  });
  list.sort((a, b) => L(a.name).localeCompare(L(b.name), curLang));
  countEl.textContent = list.length + u.unit;
  if (!list.length) {
    gridEl.innerHTML = '<div class="empty-msg">' + escapeHTML(u.empty) + '</div>';
    return;
  }
  gridEl.innerHTML = list.map(f =>
    '<div class="item" data-code="' + f.code + '">' +
    '<div class="flag-box"><img loading="lazy" src="flags/' + f.code + '.svg" alt="' + escapeHTML(L(f.name)) + '"></div>' +
    '<div class="nm">' + escapeHTML(L(f.name)) + '</div>' +
    '<div class="rg">' + escapeHTML(u[f.region]) + '</div>' +
    '</div>'
  ).join('');
  gridEl.querySelectorAll('.item').forEach(el => el.addEventListener('click', () => {
    const f = FLAGS.find(x => x.code === el.dataset.code);
    if (f) openModal(f);
  }));
}

function rowTag(off) {
  const u = UITR[curLang] || UITR.en;
  return off
    ? '<span class="tag tag-off">' + escapeHTML(u.official) + '</span>'
    : '<span class="tag tag-pop">' + escapeHTML(u.popular) + '</span>';
}

function buildDetail(f) {
  const u = UITR[curLang] || UITR.en;
  const subName = TR[curLang === 'en' ? 'ja' : 'en'][f.name];
  let h = '<div class="detail-flag"><div class="flag-box"><img src="flags/' + f.code + '.svg" alt=""></div></div>';
  h += '<div class="detail-name">' + escapeHTML(L(f.name)) + '</div>';
  h += '<div class="detail-sub">' + escapeHTML(subName) + '</div>';
  h += '<div class="chips-row">';
  h += '<span class="chip">' + escapeHTML(u[f.region]) + '</span>';
  h += '<span class="chip">' + escapeHTML(u.ratio) + ' ' + escapeHTML(f.ratio) + '</span>';
  h += '<span class="chip">' + escapeHTML(u.adopted) + ' ' + escapeHTML(L(f.year)) + '</span>';
  if (f.disp) h += '<span class="chip chip-disp">' + escapeHTML(u.disputed) + '</span>';
  h += '</div>';
  h += '<div class="section"><div class="section-title">' + escapeHTML(u.colors) + '</div>';
  f.colors.forEach(c => {
    h += '<div class="crow"><span class="swatch" style="background:' + escapeHTML(c.hex) + '"></span>' +
      '<div class="crow-b"><div class="row-h">' + escapeHTML(L(c.label)) + ' ' + rowTag(c.off) + '</div>' +
      '<div class="row-m">' + escapeHTML(L(c.mean)) + '</div></div></div>';
  });
  h += '</div>';
  if (f.emblems && f.emblems.length) {
    h += '<div class="section"><div class="section-title" style="color:#e3bd7e">' + escapeHTML(u.symbols) + '</div>';
    f.emblems.forEach(e => {
      h += '<div class="erow"><div class="row-h">' + escapeHTML(L(e.name)) + ' ' + rowTag(e.off) + '</div>' +
        '<div class="row-m">' + escapeHTML(L(e.mean)) + '</div></div>';
    });
    h += '</div>';
  }
  h += '<div class="advice"><div class="advice-label">' + escapeHTML(u.about) + '</div>' +
    '<div class="advice-text">' + escapeHTML(L(f.summary)) + '</div></div>';
  return h;
}

function openModal(f) {
  curFlag = f;
  detailEl.innerHTML = buildDetail(f);
  modalEl.classList.add('show');
  modalInner.scrollTop = 0;
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  modalEl.classList.remove('show');
  curFlag = null;
  document.body.style.overflow = '';
}

function applyLang(lang) {
  curLang = TR[lang] ? lang : 'en';
  const u = UITR[curLang] || UITR.en;
  document.documentElement.lang = curLang;
  document.documentElement.dir = RTL.has(curLang) ? 'rtl' : 'ltr';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.dataset.i18n;
    if (u[k] != null) el.textContent = u[k];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const k = el.dataset.i18nPlaceholder;
    if (u[k] != null) el.placeholder = u[k];
  });
  const sel = document.getElementById('lang-select');
  if (sel) sel.value = curLang;
  document.title = u.title + ' | Pinda Lab';
  try { localStorage.setItem('pl-lang', curLang); } catch (e) {}
  renderChips();
  renderGrid();
  if (modalEl.classList.contains('show') && curFlag) detailEl.innerHTML = buildDetail(curFlag);
}

searchEl.addEventListener('input', renderGrid);
document.getElementById('close').addEventListener('click', closeModal);
modalEl.addEventListener('click', e => { if (e.target === modalEl) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape' && modalEl.classList.contains('show')) closeModal(); });
const langSel = document.getElementById('lang-select');
langSel.innerHTML = LANGS.map(lc => '<option value="' + lc + '">' + escapeHTML(LANG_NAMES[lc]) + '</option>').join('');
langSel.addEventListener('change', () => applyLang(langSel.value));

let initLang;
try { initLang = localStorage.getItem('pl-lang'); } catch (e) {}
if (!initLang || !TR[initLang]) {
  const nav = (navigator.language || 'en').slice(0, 2).toLowerCase();
  initLang = TR[nav] ? nav : 'en';
}
applyLang(initLang);
</script>
